name: Publish Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://npm.pkg.github.com
          scope: '@mangoit-solutions'

      - name: Read release metadata from PR description
        id: release_metadata
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            let pr = null;
            try {
              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });

              pr = prs.data.find((candidate) => candidate.base.ref === 'main') || prs.data[0] || null;
            } catch (error) {
              core.warning(`Unable to list pull requests associated with commit ${context.sha}: ${error.message}`);
            }
            if (!pr) {
              const mergeMessage = context.payload.head_commit?.message || '';
              const match = mergeMessage.match(/#(\d+)/);
              if (match) {
                try {
                  const response = await github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: Number(match[1]),
                  });
                  if (response.data.base.ref === 'main') {
                    pr = response.data;
                  }
                } catch (error) {
                  core.info(`Unable to load PR #${match[1]} from merge commit message: ${error.message}`);
                }
              }
            }

            if (!pr) {
              core.setOutput('should_release', 'false');
              core.setOutput('reason', 'No merged PR associated with this main branch commit. Ensure the change reached main through a pull request merge.');
              return;
            }

            const body = pr.body || '';
            const blockMatch = body.match(/<!--\s*mango-release:start\s*-->([\s\S]*?)<!--\s*mango-release:end\s*-->/i);
            if (!blockMatch) {
              core.setOutput('should_release', 'false');
              core.setOutput('reason', 'No mango-release metadata block found in the PR description. PR comments are not used for release metadata.');
              core.setOutput('pr_number', String(pr.number));
              return;
            }

            const block = blockMatch[1];
            const readField = (name) => {
              const match = block.match(new RegExp(`^\\s*${name}:\\s*(.+)$`, 'mi'));
              return match ? match[1].trim() : '';
            };

            const releaseType = readField('releaseType');
            const migrationRequired = readField('migrationRequired');
            const backfillModules = readField('backfillModules');
            const seedMode = readField('seedMode');
            const notes = readField('notes');

            if (!releaseType) {
              core.setOutput('should_release', 'false');
              core.setOutput('reason', 'PR release metadata already consumed or missing releaseType.');
              core.setOutput('pr_number', String(pr.number));
              return;
            }

            core.setOutput('should_release', 'true');
            core.setOutput('reason', '');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('release_type', releaseType);
            core.setOutput('migration_required', migrationRequired || 'false');
            core.setOutput('backfill_modules', backfillModules || '');
            core.setOutput('seed_mode', seedMode || 'none');
            core.setOutput('notes', notes || '');

      - name: Release skipped
        if: ${{ steps.release_metadata.outputs.should_release != 'true' }}
        run: echo "${RELEASE_SKIP_REASON}"
        env:
          RELEASE_SKIP_REASON: ${{ steps.release_metadata.outputs.reason }}

      - name: Validate publish token
        if: ${{ steps.release_metadata.outputs.should_release == 'true' }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN secret is required to publish to GitHub Packages."
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure npm auth for GitHub Packages
        if: ${{ steps.release_metadata.outputs.should_release == 'true' }}
        run: |
          cat > ~/.npmrc <<EOF
          @mangoit-solutions:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NPM_TOKEN}
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare release
        id: prepare
        if: ${{ steps.release_metadata.outputs.should_release == 'true' }}
        run: node ./scripts/prepare-release.mjs
        env:
          RELEASE_TYPE: ${{ steps.release_metadata.outputs.release_type }}
          MIGRATION_REQUIRED: ${{ steps.release_metadata.outputs.migration_required }}
          BACKFILL_MODULES: ${{ steps.release_metadata.outputs.backfill_modules }}
          SEED_MODE: ${{ steps.release_metadata.outputs.seed_mode }}
          RELEASE_NOTES: ${{ steps.release_metadata.outputs.notes }}

      - name: Mark PR release metadata as consumed
        if: ${{ steps.prepare.outcome == 'success' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number('${{ steps.release_metadata.outputs.pr_number }}');
            if (!prNumber) {
              core.notice('No pull request number available to update release metadata.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const body = pr.body || '';
            const replacement = [
              '<!-- mango-release:start -->',
              'released: true',
              '<!-- mango-release:end -->',
            ].join('\n');

            const updatedBody = body.replace(
              /<!--\s*mango-release:start\s*-->[\s\S]*?<!--\s*mango-release:end\s*-->/i,
              replacement,
            );

            if (updatedBody === body) {
              core.notice('PR description did not contain a replaceable mango-release block.');
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: updatedBody,
            });

      - name: Commit release version
        if: ${{ steps.prepare.outcome == 'success' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if [ -f package-lock.json ]; then git add package-lock.json; fi
          if git diff --cached --quiet; then
            echo "No release changes to commit."
          else
            git commit -m "chore: release package"
            git push
          fi

      - name: Publish package
        if: ${{ steps.prepare.outcome == 'success' }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
